<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JbShoes — Chaussures Premium au Maroc</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Cinzel:wght@400;600;700&family=Josefin+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/spritespin@4.0.11/release/spritespin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a0a0a',
                        secondary: '#e8ddd0',
                        accent: '#c9a96e',
                    },
                    fontFamily: {
                        display: ['Cormorant Garamond', 'serif'],
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            /* Design System */
            --primary: #0a0a0a;
            --secondary: #e8ddd0;
            --accent: #c9a96e;
            --bg: #ffffff;
            --text-light: #666666;
            --text-dark: #333333;
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'DM Sans', sans-serif;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            font-family: var(--font-body);
            color: var(--text-dark);
            background: var(--bg);
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        .display-text {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--primary);
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        button {
            font-family: var(--font-body);
            cursor: pointer;
            transition: var(--transition);
        }

        input,
        select,
        textarea {
            font-family: var(--font-body);
            border: 1px solid #ddd;
            padding: 12px;
            width: 100%;
            outline: none;
            transition: var(--transition);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        /* Layout Utilities */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .grid {
            display: grid;
        }

        .gap-4 {
            gap: 16px;
        }

        .gap-8 {
            gap: 32px;
        }

        .mb-2 {
            margin-bottom: 8px;
        }

        .mb-4 {
            margin-bottom: 16px;
        }

        .mb-8 {
            margin-bottom: 32px;
        }

        .mt-8 {
            margin-top: 32px;
        }

        .text-center {
            text-align: center;
        }

        /* Buttons */
        .btn {
            padding: 14px 28px;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: var(--secondary);
        }

        .btn-outline {
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-block {
            width: 100%;
        }

        /* Ticker */
        .ticker-wrap {
            background: var(--primary);
            color: var(--accent);
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(201, 169, 110, 0.3);
            position: relative;
        }

        /* Subtle golden shimmer line at the bottom */
        .ticker-wrap::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a96e, transparent);
            animation: shimmerLine 3s ease-in-out infinite;
        }

        @keyframes shimmerLine {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .ticker {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
        }

        .ticker-item {
            padding: 0 60px;
            display: inline-block;
            color: var(--accent);
            text-shadow: 0 0 12px rgba(201, 169, 110, 0.4);
        }

        /* Séparateur doré entre items */
        .ticker-item::after {
            content: ' ✦ ';
            opacity: 0.6;
        }

        @keyframes ticker {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-100%, 0, 0);
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: var(--transition);
        }

        .nav-brand {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-links a {
            margin: 0 16px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--primary);
            transition: var(--transition);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cart-icon-wrap {
            position: relative;
            cursor: pointer;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Hero */
        .hero {
            height: 80vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            background: var(--secondary);
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 500px;
            padding: 40px;
        }

        .hero-title {
            font-size: 64px;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-subtitle {
            font-size: 18px;
            margin-bottom: 30px;
            color: var(--text-light);
        }

        .hero-image {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            object-fit: cover;
        }

        .spin-badge {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            text-align: center;
            animation: spin 10s linear infinite;
            font-family: var(--font-display);
            font-weight: bold;
            padding: 20px;
            z-index: 5;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Product Card */
        .product-card {
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        .product-card .image-wrapper {
            position: relative;
            padding-bottom: 120%;
            overflow: hidden;
            background: #f9f9f9;
        }

        .product-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--primary);
            color: white;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 8px;
            z-index: 2;
        }

        .product-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
            opacity: 0;
            transition: var(--transition);
            z-index: 2;
            display: flex;
            justify-content: center;
        }

        .product-card:hover .product-overlay {
            opacity: 1;
            bottom: 10px;
        }

        .product-info {
            padding: 16px 0;
        }

        .product-title {
            font-size: 18px;
            margin-bottom: 4px;
            font-family: var(--font-display);
            font-weight: 600;
        }

        .product-price {
            font-weight: 500;
            color: var(--text-light);
        }

        .product-price.sale {
            color: var(--accent);
        }

        .old-price {
            text-decoration: line-through;
            color: #aaa;
            margin-left: 8px;
            font-size: 0.9em;
        }

        /* Shop Page */
        .shop-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
            padding: 60px 0;
        }

        /* Shop Sidebar Styles */
        .filters {
            position: sticky;
            top: 100px;
            align-self: flex-start;
        }

        .filters-title {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.25);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filters-title::before {
            content: '';
            display: inline-block;
            width: 18px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .filter-group {
            margin-bottom: 0;
            padding: 6px 0;
        }

        /* Category Items */
        .cat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Josefin Sans', sans-serif;
            color: #888;
            transition: all 0.25s ease;
            position: relative;
            margin-bottom: 4px;
            border: 1px solid transparent;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .cat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 3px;
            height: 60%;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
            transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .cat-item:hover {
            background: rgba(201, 169, 110, 0.07);
            color: var(--primary);
            border-color: rgba(201, 169, 110, 0.15);
            padding-left: 20px;
        }

        .cat-item:hover::before {
            transform: translateY(-50%) scaleY(1);
        }

        .cat-item.active {
            background: rgba(201, 169, 110, 0.12);
            color: var(--primary);
            font-weight: 700;
            border-color: rgba(201, 169, 110, 0.3);
            padding-left: 20px;
        }

        .cat-item.active::before {
            transform: translateY(-50%) scaleY(1);
        }

        .cat-emoji {
            font-size: 16px;
            line-height: 1;
            flex-shrink: 0;
        }

        /* ===== SEARCH BAR: Skewed Brutalist Design ===== */
        .search-label {
            width: 100%;
            position: relative;
            display: block;
        }

        .search-input-skewed {
            width: 100%;
            display: flex;
            padding: 14px 16px;
            background-color: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 13px;
            font-family: var(--font-body);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            height: 54px;
            transform: skew(-3deg, 1deg);
            box-shadow: 3px 2px 0px 2px var(--primary), 0px -1px 0px 2px rgba(10, 10, 10, 0.55);
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input-skewed:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 3px 2px 0px 2px var(--accent), 0px -1px 0px 2px rgba(201, 169, 110, 0.55);
            color: var(--primary);
        }

        /* ===== SEARCH Letters Float Animation ===== */
        .search-letters {
            position: absolute;
            top: 16px;
            left: 16px;
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            pointer-events: none;
            z-index: 2;
        }

        .search-letters li {
            color: transparent;
            position: relative;
            width: 13px;
            pointer-events: none;
            transition: 500ms ease-in-out;
        }

        /* ::before = letter sitting inside input (placeholder) */
        .search-letters li::before {
            color: #aaa;
            position: absolute;
            top: 0px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 500ms ease-in-out;
        }

        /* ::after = golden letter that floats above on focus */
        .search-letters li::after {
            color: var(--accent);
            position: absolute;
            top: -45px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transform: scale(0) rotate(210deg);
            filter: blur(20px);
            transition: 500ms ease-in-out;
        }

        /* Individual letter content + staggered delays */
        .search-letters li.li-s::before {
            content: 'S';
            transition-delay: 200ms;
        }

        .search-letters li.li-s::after {
            content: 'S';
            transition-delay: 400ms;
        }

        .search-letters li.li-e::before {
            content: 'E';
            transition-delay: 400ms;
        }

        .search-letters li.li-e::after {
            content: 'E';
            transition-delay: 600ms;
        }

        .search-letters li.li-a::before {
            content: 'A';
            transition-delay: 600ms;
        }

        .search-letters li.li-a::after {
            content: 'A';
            transition-delay: 800ms;
        }

        .search-letters li.li-r::before {
            content: 'R';
            transition-delay: 800ms;
        }

        .search-letters li.li-r::after {
            content: 'R';
            transition-delay: 1000ms;
        }

        .search-letters li.li-c::before {
            content: 'C';
            transition-delay: 1000ms;
        }

        .search-letters li.li-c::after {
            content: 'C';
            transition-delay: 1200ms;
        }

        .search-letters li.li-h::before {
            content: 'H';
            transition-delay: 1200ms;
        }

        .search-letters li.li-h::after {
            content: 'H';
            transition-delay: 1400ms;
        }

        /* ON FOCUS: ::before blurs & flies upward */
        .search-input-skewed:focus~.search-letters li::before {
            filter: blur(20px);
            transform: translate(0, -35px) rotate(-210deg);
        }

        /* ON FOCUS: ::after de-blurs & appears above */
        .search-input-skewed:focus~.search-letters li::after {
            filter: blur(0);
            transform: scale(1) rotate(0);
        }

        /* Hide letters when input has content (not empty) */
        .search-input-skewed:not(:placeholder-shown)~.search-letters {
            opacity: 0;
            pointer-events: none;
        }

        .filter-list {
            list-style: none;
        }

        .filter-list li:hover,
        .filter-list li.active {
            color: var(--accent);
            font-weight: 500;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* ===== Shop Main Header ===== */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        .shop-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 2px;
            background: var(--accent);
        }

        .shop-collection-title {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1;
        }

        .shop-collection-title span {
            display: block;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .shop-count-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .shop-count-badge strong {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .shop-count-badge small {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* ===== Brand Filter Badges in Shop ===== */
        .brand-badge {
            padding: 7px 16px;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            color: #888;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Josefin Sans', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .brand-badge:hover {
            border-color: var(--accent);
            color: var(--primary);
            background: rgba(201, 169, 110, 0.05);
        }

        .brand-badge.active {
            background: var(--primary);
            color: var(--accent);
            border-color: var(--primary);
        }

        /* Empty state */
        .shop-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }

        .shop-empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .shop-empty h3 {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .shop-empty p {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            color: #aaa;
        }

        /* ===== Trending Section ===== */
        .trending-section {
            padding: 90px 24px;
            background: transparent;
            position: relative;
        }

        .trending-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 50px;
        }

        .trending-title-wrap {
            position: relative;
        }

        .trending-eyebrow {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trending-eyebrow::before {
            content: '';
            display: inline-block;
            width: 30px;
            height: 1px;
            background: var(--accent);
        }

        .trending-title {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
        }

        /* Dynamic VOIR TOUT button */
        .voir-tout-btn {
            position: relative;
            padding: 14px 36px;
            background: transparent;
            border: none;
            cursor: pointer;
            overflow: hidden;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--primary);
            transition: color 0.4s ease;
        }

        /* Main border frame */
        .voir-tout-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--primary);
            transition: border-color 0.4s ease;
        }

        /* Golden fill sliding from left */
        .voir-tout-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--primary);
            transform: translateX(-101%);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 0;
        }

        .voir-tout-btn span {
            position: relative;
            z-index: 1;
            transition: color 0.4s ease;
        }

        .voir-tout-btn:hover::after {
            transform: translateX(0);
        }

        .voir-tout-btn:hover span {
            color: var(--accent);
        }

        /* Arrow that slides in */
        .voir-tout-btn .btn-arrow {
            display: inline-block;
            margin-left: 8px;
            transition: transform 0.4s ease;
        }

        .voir-tout-btn:hover .btn-arrow {
            transform: translateX(5px);
        }

        /* Star Button Animation */
        .star-btn {
            position: relative;
            padding: 10px 24px;
            background: var(--accent);
            font-size: 12px;
            font-weight: 700;
            font-family: 'Josefin Sans', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--primary);
            border: 2px solid var(--accent);
            border-radius: 8px;
            box-shadow: 0 0 0 rgba(201, 169, 110, 0.5);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            overflow: visible;
        }

        .star-btn:hover {
            background: transparent;
            color: var(--accent);
            box-shadow: 0 0 25px rgba(201, 169, 110, 0.6);
        }

        .star-btn.active {
            background: var(--primary);
            color: var(--accent);
            border-color: var(--primary);
        }

        .star-btn .star-1 {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 20px;
            height: auto;
            filter: drop-shadow(0 0 0 #fffdef);
            z-index: -5;
            transition: all 1s cubic-bezier(0.05, 0.83, 0.43, 0.96);
            pointer-events: none;
        }

        .star-btn .star-2 {
            position: absolute;
            top: 45%;
            left: 45%;
            width: 12px;
            height: auto;
            filter: drop-shadow(0 0 0 #fffdef);
            z-index: -5;
            transition: all 1s cubic-bezier(0, 0.4, 0, 1.01);
            pointer-events: none;
        }

        .star-btn .star-3 {
            position: absolute;
            top: 40%;
            left: 40%;
            width: 5px;
            height: auto;
            filter: drop-shadow(0 0 0 #fffdef);
            z-index: -5;
            transition: all 1s cubic-bezier(0, 0.4, 0, 1.01);
            pointer-events: none;
        }

        .star-btn .star-4 {
            position: absolute;
            top: 20%;
            left: 40%;
            width: 7px;
            height: auto;
            filter: drop-shadow(0 0 0 #fffdef);
            z-index: -5;
            transition: all 0.8s cubic-bezier(0, 0.4, 0, 1.01);
            pointer-events: none;
        }

        .star-btn .star-5 {
            position: absolute;
            top: 25%;
            left: 45%;
            width: 12px;
            height: auto;
            filter: drop-shadow(0 0 0 #fffdef);
            z-index: -5;
            transition: all 0.6s cubic-bezier(0, 0.4, 0, 1.01);
            pointer-events: none;
        }

        .star-btn .star-6 {
            position: absolute;
            top: 5%;
            left: 50%;
            width: 5px;
            height: auto;
            filter: drop-shadow(0 0 0 #fffdef);
            z-index: -5;
            transition: all 0.8s ease;
            pointer-events: none;
        }

        /* Hover: stars fly outward */
        .star-btn:hover .star-1 {
            top: -80%;
            left: -30%;
            filter: drop-shadow(0 0 10px #fffdef);
            z-index: 2;
        }

        .star-btn:hover .star-2 {
            top: -25%;
            left: 10%;
            filter: drop-shadow(0 0 10px #fffdef);
            z-index: 2;
        }

        .star-btn:hover .star-3 {
            top: 55%;
            left: 25%;
            filter: drop-shadow(0 0 10px #fffdef);
            z-index: 2;
        }

        .star-btn:hover .star-4 {
            top: 30%;
            left: 80%;
            filter: drop-shadow(0 0 10px #fffdef);
            z-index: 2;
        }

        .star-btn:hover .star-5 {
            top: 25%;
            left: 115%;
            filter: drop-shadow(0 0 10px #fffdef);
            z-index: 2;
        }

        .star-btn:hover .star-6 {
            top: 5%;
            left: 60%;
            filter: drop-shadow(0 0 10px #fffdef);
            z-index: 2;
        }

        .star-btn .star-svg-fill {
            fill: #fffde7;
        }

        /* Product Detail */
        .detail-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 60px 0;
        }

        .detail-gallery {
            display: flex;
            gap: 20px;
        }

        .detail-thumbnails {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 80px;
        }

        .detail-thumbnails img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .detail-thumbnails img.active {
            border-color: var(--primary);
        }

        .detail-main-img {
            flex: 1;
            background: #f9f9f9;
        }

        .detail-main-img img {

            height: auto;

        }

        .detail-title {

        .detail-price {

        .size-selector {

            gap: 10px;

        .quantity-btn {

        .quantity-input {

        /* Cart Page */
        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            padding: 60px 0;
        }

        .cart-item {

            padding: 20px 0;
            border-bottom: 1px solid #eee;

        .cart-item-info {

        }

        .cart-summary {

        .summary-row {

            color: var(--text-light);

        .summary-total {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);

        /* Auth Forms */
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Loading Skeleton */
        .skeleton {
            background: #f0f0f0;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 16px 24px;
            background: var(--primary);
            color: white;
            border-left: 4px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s forwards;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        .toast.success {
            border-left-color: #10b981;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Admin Dashboard */
        .admin-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 30px;
            padding: 40px 0;
        }

        .admin-nav {
            list-style: none;
        }

        .admin-nav li {
            padding: 12px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        .admin-nav li:hover,
        .admin-nav li.active {
            background: var(--secondary);
            color: var(--primary);
            font-weight: bold;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .table th {
            font-family: var(--font-display);
            background: #f9f9f9;
        }

        /* Animations */
        .page-enter {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Filtrage Marques (Shop) */
        .brands-container {
            animation: slideDownFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-wrap: wrap;

            padding: 15px 0;
            border-bottom: 1px solid #eaeaea;
        }

        @keyframes slideDownFade {

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-badge {

        .brand-badge.active {

        }


        /* Urban Jungle UI */
        .home-hero-urban {
            position: relative;
            width: 100%;
            height: 80vh;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        .hero-img-urban {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            z-index: 0;
        }

        .hero-content-urban {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            max-width: 800px;
            padding: 0 20px;
        }

        .hero-title-urban {
            font-family: var(--font-display);
            font-size: 4.5rem;
            font-weight: 900;

        .brand-strip {

            padding: 40px 20px;

        .brand-strip::-webkit-scrollbar {

        .brand-logo-btn {

        .brand-logo-btn:hover {

        .split-banner-container {

        .split-card {

        .split-card::after {

        /* Navbar Custom Button */
        .btn-connexion-cinematic {
            position: relative;
            padding: 10px 24px;
            border-radius: 7px;
            border: 1px solid var(--accent);
            font-family: var(--font-body);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            background: transparent;
            color: var(--primary);
            overflow: hidden;
            box-shadow: 0 0 0 0 transparent;
            transition: all 0.2s ease-in;
            cursor: pointer;
        }

        .btn-connexion-cinematic:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 20px 5px rgba(201, 169, 110, 0.5);
            transition: all 0.2s ease-out;
        }

        .btn-connexion-cinematic:hover::before,
        .btn-cart-cinematic:hover::before {
            animation: sh02 0.5s 0s linear;
        }

        .btn-connexion-cinematic::before,
        .btn-cart-cinematic::before {
            content: '';
            display: block;
            width: 0px;
            height: 86%;
            position: absolute;
            top: 7%;
            left: 0%;
            opacity: 0;
            background: #fff;
            box-shadow: 0 0 50px 30px #fff;
            transform: skewX(-20deg);
            z-index: 1;
        }

        @keyframes sh02 {
            from {
                opacity: 0;
                left: 0%;
            }

            50% {
                opacity: 1;
            }

            to {
                opacity: 0;
                left: 100%;
            }
        }

        .btn-connexion-cinematic:active,
        .btn-cart-cinematic:active {
            box-shadow: 0 0 0 0 transparent;
            transition: box-shadow 0.2s ease-in;
        }

        .btn-cart-cinematic {
            position: relative;
            padding: 10px;
            border-radius: 7px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--primary);
            overflow: hidden;
            box-shadow: 0 0 0 0 transparent;
            transition: all 0.2s ease-in;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cart-cinematic:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 20px 5px rgba(201, 169, 110, 0.5);
            transition: all 0.2s ease-out;
        }

        .btn-cart-cinematic svg {
            position: relative;
            z-index: 2;
        }

        /* Animated Navbar Border (Adapted from User request) */
        .navbar-animated-box {
            position: relative;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .navbar-border-container {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            overflow: hidden;
            pointer-events: none;
        }

        .nav-border-line {
            position: absolute;
            background: var(--accent);
            /* Uses site color #c9a96e */
            box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent);
        }

        .nav-border-line:nth-child(1) {
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            animation: animateNavX 4s linear infinite;
        }

        .nav-border-line:nth-child(2) {
            top: 0;
            right: 0;
            width: 2px;
            height: 100%;
            animation: animateNavY 4s linear infinite;
        }

        .nav-border-line:nth-child(3) {
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            animation: animateNavXReverse 4s linear infinite;
        }

        .nav-border-line:nth-child(4) {
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            animation: animateNavYReverse 4s linear infinite;
        }

        @keyframes animateNavX {
            0% {
                transform: scaleX(0);
                transform-origin: left;
            }

            50% {
                transform: scaleX(1);
                transform-origin: left;
            }

            50.1% {
                transform: scaleX(1);
                transform-origin: right;
            }

            100% {
                transform: scaleX(0);
                transform-origin: right;
            }
        }

        @keyframes animateNavY {
            0% {
                transform: scaleY(0);
                transform-origin: top;
            }

            50% {
                transform: scaleY(1);
                transform-origin: top;
            }

            50.1% {
                transform: scaleY(1);
                transform-origin: bottom;
            }

            100% {
                transform: scaleY(0);
                transform-origin: bottom;
            }
        }

        @keyframes animateNavXReverse {
            0% {
                transform: scaleX(0);
                transform-origin: right;
            }

            50% {
                transform: scaleX(1);
                transform-origin: right;
            }

            50.1% {
                transform: scaleX(1);
                transform-origin: left;
            }

            100% {
                transform: scaleX(0);
                transform-origin: left;
            }
        }

        @keyframes animateNavYReverse {
            0% {
                transform: scaleY(0);
                transform-origin: bottom;
            }

            50% {
                transform: scaleY(1);
                transform-origin: bottom;
            }

            50.1% {
                transform: scaleY(1);
                transform-origin: top;
            }

            100% {
                transform: scaleY(0);
                transform-origin: top;
            }
        }


        /* ===== BRAND SLIDER: item-color Design ===== */
        .brand-dock-container {
            display: flex;
            transform-style: preserve-3d;
            transform: perspective(1000px);
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 50px 30px;
            flex-wrap: wrap;
            background: transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            overflow: visible;
            position: relative;
            z-index: 1;
        }

        /* Animated moving columns background */
        .brand-dock-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201, 169, 110, 0.04) 40px, rgba(201, 169, 110, 0.04) 80px);
            z-index: -1;
            animation: moveBgColumns 5s linear infinite;
        }

        /* Glowing gradient to add depth */
        .brand-dock-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(201, 169, 110, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        @keyframes moveBgColumns {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: -80px 0;
            }
        }


        .brand-dock-item {
            position: relative;
            flex-shrink: 0;
            height: 52px;
            padding: 0 22px;
            border: none;
            outline: none;
            background: transparent;
            transition: 500ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The colored pill — fills behind the text */
        .brand-dock-item::after {
            position: absolute;
            content: "";
            inset: 0;
            background-color: var(--brand-color, var(--accent));
            border-radius: 10px;
            transform: scale(1);
            pointer-events: none;
            transition: 500ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
            opacity: 0.85;
            box-shadow: 0 4px 20px rgba(201, 169, 110, 0.35);
        }

        /* Tooltip label above on hover */
        .brand-dock-item::before {
            position: absolute;
            content: attr(aria-label);
            left: 50%;
            bottom: calc(100% + 10px);
            font-size: 10px;
            line-height: 14px;
            transform: translateX(-50%);
            padding: 3px 8px;
            background-color: #ffffff;
            color: #111;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            white-space: nowrap;
            font-family: var(--font-body);
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: 300ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 200;
        }

        /* Brand name text sits above the ::after pill */
        .brand-dock-item span {
            position: relative;
            z-index: 2;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: white;
            transition: 300ms ease;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .brand-dock-item:hover {
            transform: scale(1.5);
            z-index: 99999;
        }

        .brand-dock-item:hover::after {
            transform: scale(1.08);
            opacity: 1;
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.55);
        }

        .brand-dock-item:hover::before {
            opacity: 1;
            visibility: visible;
        }

        .brand-dock-item:active::after {
            transform: scale(0.95);
        }

        /* macOS Dock Ripple Effect */
        .brand-dock-item:hover+.brand-dock-item {
            transform: scale(1.3);
            z-index: 9999;
        }

        .brand-dock-item:hover+.brand-dock-item+.brand-dock-item {
            transform: scale(1.15);
            z-index: 999;
        }

        .brand-dock-item:has(+ .brand-dock-item:hover) {
            transform: scale(1.3);
            z-index: 9999;
        }

        .brand-dock-item:has(+ .brand-dock-item + .brand-dock-item:hover) {
            transform: scale(1.15);
            z-index: 999;
        }

        /* 'All brands' special item */
        .brand-dock-item.all-brands::after {
            background: linear-gradient(135deg, var(--accent) 0%, #b8860b 100%);

        /* ===== EXPERIMENTAL CAROUSEL SWIPER ===== */
        .co-carousel-wrap {

        .co-carousel__slide {

        /* --- Advanced UI: Side Cart --- */
        .side-cart-overlay {

        /* --- Advanced UI: Promo Tickets --- */
        .promo-ticket-container {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .promo-ticket {
            background: white;
            border: 2px dashed var(--accent);
            padding: 16px;
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .promo-ticket::before,
        .promo-ticket::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: #f9f9f9;
            /* Match background */
            border-radius: 50%;
            transform: translateY(-50%);
            border: 2px dashed var(--accent);
        }

        .promo-ticket::before {
            left: -12px;
        }

        .promo-ticket::after {
            right: -12px;
        }

        .promo-ticket:hover {
            background: rgba(201, 169, 110, 0.05);
            transform: translateY(-2px);
        }

        .promo-ticket.active {
            background: var(--accent);
            color: white;
            border-style: solid;
        }

        .promo-ticket.active .promo-code {
            color: white;

            justify-content: space-between;

        .card-wrapper {

            margin: 20px auto;

        .card-inner {

            height: 100%;

            transition: transform 0.6s;

        .card-back {

            width: 100%;
            height: 100%;

            background: white;
