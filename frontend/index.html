            margin-top: 10px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useMemo, useRef } = React;
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? `http://${window.location.hostname}:5000/api`
            : 'https://solestyle-ecommerce-production.up.railway.app/api';

        // --- Contexts ---
        const ToastContext = createContext();
        const AuthContext = createContext();
        const CartContext = createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="toast-container">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast ${t.type}`}>{t.message}</div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const AuthProvider = ({ children }) => {
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [authLoading, setAuthLoading] = useState(!!localStorage.getItem('token'));
            const showToast = useContext(ToastContext);

            useEffect(() => {
                if (token) {
                    setAuthLoading(true);
                    axios.get(`${API_URL}/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
                        .then(res => { setUser(res.data); setAuthLoading(false); })
                        .catch(() => {
                            setToken(null);
                            setUser(null);
                            localStorage.removeItem('token');
                            setAuthLoading(false);
                        });
                } else {
                    setAuthLoading(false);
                }
            }, [token]);

            const login = async (email, password) => {
                try {
                    const res = await axios.post(`${API_URL}/auth/login`, { email, password });
                    setToken(res.data.token);
                    localStorage.setItem('token', res.data.token);
                    setUser(res.data.user);
                    showToast('Connexion réussie', 'success');
                    return true;
                } catch (err) {
                    showToast(err.response?.data?.message || 'Erreur de connexion', 'error');
                    return false;
                }
            };

            const logout = () => {
                setToken(null);
                setUser(null);
                localStorage.removeItem('token');
                showToast('Déconnexion', 'info');
            };

            return (
                <AuthContext.Provider value={{ user, token, login, logout, authLoading }}>
                    {children}
                </AuthContext.Provider>
            );
        };

        const CartProvider = ({ children }) => {
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [cart, setCart] = useState({ items: [] });
            const { token, user } = useContext(AuthContext);
            const showToast = useContext(ToastContext);

            const fetchCart = async () => {
                if (!token) {
                    // Local cart for guests (simplified)
                    try {
                        const local = localStorage.getItem('cart');
                        if (local) {
                            const parsed = JSON.parse(local);
                            // Filter out any corrupted items where product is null
                            if (parsed && parsed.items) {
                                parsed.items = parsed.items.filter(i => i && i.product && i.product._id);
                            }
                            setCart(parsed || { items: [] });
                        }
                    } catch(e) {
                        localStorage.removeItem('cart');
                        setCart({ items: [] });
                    }
                    return;
                }
                try {
                    const res = await axios.get(`${API_URL}/cart`, { headers: { Authorization: `Bearer ${token}` } });
                    // Filter out items where product is null (deleted products)
                    const cartData = res.data;
                    if (cartData && cartData.items) {
                        cartData.items = cartData.items.filter(i => i && i.product && i.product._id);
                    }
                    setCart(cartData || { items: [] });
                } catch (err) {
                    console.error("Erreur panier");
                }
            };

            useEffect(() => { fetchCart(); }, [token]);

            const addToCart = async (productId, size, quantity = 1, productData = null) => {
                if (!size) {
                    showToast('Veuillez sélectionner une taille', 'error');
                    return;
                }
                if (token) {
                    try {
                        await axios.post(`${API_URL}/cart`, { productId, size, quantity }, { headers: { Authorization: `Bearer ${token}` } });
                        fetchCart();
                        showToast('Article ajouté au panier', 'success');
                        setIsCartOpen(true); // Open side cart
                    } catch (err) {
                        showToast(err.response?.data?.message || 'Erreur', 'error');
                    }
                } else {
                    // Guest cart
                    const currentItems = cart.items || [];
                    const newItems = [...currentItems];
                    const existingIndex = newItems.findIndex(i => i.product._id === productId && i.size === size);

                    if (existingIndex >= 0) {
                        newItems[existingIndex] = {
                            ...newItems[existingIndex],
                            quantity: newItems[existingIndex].quantity + quantity
                        };
                    } else {
                        newItems.push({ product: productData, size, quantity });
                    }

                    const newCart = { ...cart, items: newItems };
                    setCart(newCart);
                    localStorage.setItem('cart', JSON.stringify(newCart));
                    showToast('Article ajouté au panier', 'success');
                    setIsCartOpen(true); // Open side cart
                }
            };

            const removeFromCart = async (itemId, isGuest = false) => {
                if (token && !isGuest) {
                    try {
                        await axios.delete(`${API_URL}/cart/${itemId}`, { headers: { Authorization: `Bearer ${token}` } });
                        fetchCart();
                    } catch (err) { }
                } else {
                    const currentItems = cart.items || [];
                    const newCart = { ...cart, items: currentItems.filter((_, idx) => idx !== itemId) };
                    setCart(newCart);
                    localStorage.setItem('cart', JSON.stringify(newCart));
                }
            };

            const clearCart = async () => {
                if (token) {
                    try {
                        await axios.delete(`${API_URL}/cart`, { headers: { Authorization: `Bearer ${token}` } });
                        fetchCart();
                    } catch (err) { }
                } else {
                    setCart({ items: [] });
                    localStorage.removeItem('cart');
                }
            };

            const cartCount = cart.items?.reduce((acc, item) => acc + (item?.quantity || 0), 0) || 0;
            const subtotal = cart.items?.reduce((acc, item) => acc + ((item?.product?.price || 0) * (item?.quantity || 0)), 0) || 0;

            return (
                <CartContext.Provider value={{ cart, cartCount, subtotal, addToCart, removeFromCart, clearCart, isCartOpen, setIsCartOpen }}>
                    {children}
                </CartContext.Provider>
            );
        };

        // --- Advanced UI Components ---
        const SideCart = ({ setRoute }) => {
            const { cart, cartCount, subtotal, removeFromCart, isCartOpen, setIsCartOpen } = useContext(CartContext);
            const { token } = useContext(AuthContext);

            return (
                <>
                    <div className={`side-cart-overlay ${isCartOpen ? 'open' : ''}`} onClick={() => setIsCartOpen(false)}></div>
                    <div className={`side-cart ${isCartOpen ? 'open' : ''}`}>
                        <div className="side-cart-header">
                            <h2 className="display-text" style={{ fontSize: '24px' }}>Mon Panier ({cartCount})</h2>
                            <button onClick={() => setIsCartOpen(false)} style={{ background: 'none', border: 'none', fontSize: '24px', cursor: 'pointer' }}>&times;</button>
                        </div>
                        <div className="side-cart-content">
                            {cart.items?.length === 0 ? (
                                <p style={{ textAlign: 'center', color: '#666', marginTop: '50px' }}>Votre panier est vide</p>
                            ) : (
                                cart.items?.map((item, idx) => (
                                    <div key={item._id || idx} style={{ display: 'flex', gap: '15px', marginBottom: '20px', paddingBottom: '15px', borderBottom: '1px solid #f5f5f5' }}>
                                        <img src={item.product.images?.[0] || 'https://via.placeholder.com/80'} style={{ width: '80px', height: '80px', objectFit: 'cover', borderRadius: '8px' }} />
                                        <div style={{ flexGrow: 1 }}>
                                            <h4 style={{ fontSize: '14px', fontWeight: 'bold' }}>{item.product.name}</h4>
                                            <p style={{ fontSize: '12px', color: '#666' }}>Taille: {item.size} | Qté: {item.quantity}</p>
                                            <p style={{ fontSize: '14px', fontWeight: 'bold', marginTop: '5px' }}>{item.product.price * item.quantity} DH</p>
                                        </div>
                                        <button onClick={() => removeFromCart(token ? item._id : idx, !token)} style={{ background: 'none', border: 'none', color: '#ef4444', fontSize: '12px', cursor: 'pointer', alignSelf: 'center' }}>Supprimer</button>
                                    </div>
                                ))
                            )}
                        </div>
                        <div className="side-cart-footer">
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px', fontWeight: 'bold' }}>
                                <span>Sous-total</span>
                                <span>{subtotal} DH</span>
                            </div>
                            <button className="btn btn-primary btn-block" onClick={() => { setIsCartOpen(false); setRoute('cart'); }}>Voir le panier complet</button>
                            <button className="btn btn-outline btn-block" style={{ marginTop: '10px' }} onClick={() => { setIsCartOpen(false); setRoute('checkout'); }}>Commander maintenant</button>
                        </div>
                    </div>
                </>
            );
        };

        const Ticker = () => (
            <div className="ticker-wrap">
                <div className="ticker">
                    <span className="ticker-item">PAIEMENT SÉCURISÉ À LA LIVRAISON</span>
                    <span className="ticker-item">NOUVELLE COLLECTION DISPONIBLE</span>
                    <span className="ticker-item">RETOURS GRATUITS SOUS 14 JOURS</span>
                    <span className="ticker-item">PAIEMENT SÉCURISÉ À LA LIVRAISON</span>
                </div>
            </div>
        );

        const Navbar = ({ setRoute, currentRoute, navigateToShop, setProductId }) => {
            const { user, logout } = useContext(AuthContext);
            const { cartCount, setIsCartOpen } = useContext(CartContext);
            const [searchTerm, setSearchTerm] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [allProducts, setAllProducts] = useState([]);
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                const fetchAll = async () => {
                    try {
                        const res = await axios.get(`${API_URL}/products?limit=1000`);
                        setAllProducts(res.data.products || res.data);
                    } catch (e) { }
                };
                fetchAll();
            }, []);

            useEffect(() => {
                if (searchTerm.trim().length > 1 && Array.isArray(allProducts)) {
                    const filtered = allProducts.filter(p =>
                        p.name?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        p.brand?.toLowerCase().includes(searchTerm.toLowerCase())
                    ).slice(0, 5);
                    setSearchResults(filtered);
                } else {
                    setSearchResults([]);
                }
            }, [searchTerm, allProducts]);

            const handleSearchSubmit = (e) => {
                if (e.key === 'Enter') {
                    navigateToShop({ search: searchTerm });
                    setSearchTerm('');
                    setSearchResults([]);
                }
            };

            const closeMenu = () => setMenuOpen(false);

            return (
                <>
                    {/* Mobile Drawer Overlay */}
                    <div className={`mobile-menu-overlay ${menuOpen ? 'open' : ''}`} onClick={closeMenu}></div>
                    {/* Mobile Drawer */}
                    <div className={`mobile-menu-drawer ${menuOpen ? 'open' : ''}`}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                            <span style={{ fontFamily: 'var(--font-display)', fontSize: '22px', fontWeight: '800' }}>JbShoes</span>
                            <button onClick={closeMenu} style={{ background: 'none', border: 'none', fontSize: '24px', cursor: 'pointer', color: 'var(--primary)' }}>✕</button>
                        </div>
                        <button className="mobile-menu-link" onClick={() => { setRoute('home'); closeMenu(); }}>🏠 Accueil</button>
                        <button className="mobile-menu-link" onClick={() => { setRoute('shop'); closeMenu(); }}>👟 Boutique</button>
                        {user?.role === 'admin' && (
                            <button className="mobile-menu-link" onClick={() => { setRoute('admin'); closeMenu(); }}>⚙️ Admin</button>
                        )}
                        <div style={{ height: '1px', background: '#eee', margin: '8px 0' }}></div>
                        {user ? (
                            <button className="mobile-menu-link" style={{ color: '#ef4444' }} onClick={() => { logout(); closeMenu(); }}>🚪 Déconnexion</button>
                        ) : (
                            <button className="mobile-menu-link" onClick={() => { setRoute('login'); closeMenu(); }}>🔑 Connexion</button>
                        )}
                        <div style={{ marginTop: '16px' }}>
                            <input
                                type="text"
                                placeholder="Rechercher..."
                                style={{ width: '100%', padding: '10px 14px', border: '1px solid #ddd', borderRadius: '8px', fontSize: '14px', outline: 'none' }}
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                onKeyDown={(e) => { if (e.key === 'Enter') { navigateToShop({ search: searchTerm }); setSearchTerm(''); closeMenu(); } }}
                            />
                        </div>
                    </div>

                    <div className="sticky top-4 z-[100] mx-4 md:mx-auto max-w-7xl transition-all duration-300">
                        <nav className="navbar-animated-box w-full backdrop-blur-xl">
                            {/* Animated Borders */}
                            <div className="navbar-border-container">
                                <span className="nav-border-line"></span>
                                <span className="nav-border-line"></span>
                                <span className="nav-border-line"></span>
                                <span className="nav-border-line"></span>
                            </div>

                            <div className="relative z-10 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center">
                                {/* Logo */}
                                <div
                                    className="font-display text-2xl md:text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-accent cursor-pointer transform hover:scale-105 transition-transform duration-300"
                                    onClick={() => setRoute('home')}
                                >
                                    JbShoes
                                </div>

                                {/* Search Bar - Desktop only */}
                                <div className="hidden lg:block relative flex-grow max-w-md mx-8">
                                    <div className="relative">
                                        <input
                                            type="text"
                                            placeholder="Rechercher un modèle..."
                                            className="w-full bg-gray-100 border-none rounded-full px-6 py-2 text-sm focus:ring-2 focus:ring-accent transition-all duration-300"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            onKeyDown={handleSearchSubmit}
                                        />
                                        <div className={`search-results-dropdown ${searchResults.length > 0 ? 'visible' : ''}`}>
                                            {searchResults.map(p => (
                                                <div key={p._id} className="search-item" onClick={() => { setRoute('product'); setProductId(p._id); setSearchTerm(''); setSearchResults([]); }}>
                                                    <img src={p.images?.[0] || 'https://via.placeholder.com/50'} alt={p.name} />
                                                    <div>
                                                        <div className="text-sm font-bold">{p.name}</div>
                                                        <div className="text-xs text-accent font-bold">{p.price} DH</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Desktop Nav Links */}
                                <div className="hidden md:flex items-center space-x-8 lg:space-x-12">
                                    <a href="#" onClick={(e) => { e.preventDefault(); setRoute('home'); }}
                                        className={`text-sm tracking-widest font-bold uppercase transition-all duration-300 hover:text-accent relative group ${currentRoute === 'home' ? 'text-accent' : 'text-gray-800'}`}>
                                        Accueil
                                        <span className={`absolute -bottom-2 left-0 w-full h-[2px] bg-accent transform origin-left transition-transform duration-300 ${currentRoute === 'home' ? 'scale-x-100' : 'scale-x-0 group-hover:scale-x-100'}`}></span>
                                    </a>
                                    <a href="#" onClick={(e) => { e.preventDefault(); setRoute('shop'); }}
                                        className={`text-sm tracking-widest font-bold uppercase transition-all duration-300 hover:text-accent relative group ${currentRoute === 'shop' ? 'text-accent' : 'text-gray-800'}`}>
                                        Boutique
                                        <span className={`absolute -bottom-2 left-0 w-full h-[2px] bg-accent transform origin-left transition-transform duration-300 ${currentRoute === 'shop' ? 'scale-x-100' : 'scale-x-0 group-hover:scale-x-100'}`}></span>
                                    </a>
                                    {user?.role === 'admin' && (
                                        <a href="#" onClick={(e) => { e.preventDefault(); setRoute('admin'); }}
                                            className={`text-sm tracking-widest font-bold uppercase transition-all duration-300 hover:text-red-500 relative group ${currentRoute === 'admin' ? 'text-red-500' : 'text-gray-800'}`}>
                                            Admin
                                            <span className={`absolute -bottom-2 left-0 w-full h-[2px] bg-red-500 transform origin-left transition-transform duration-300 ${currentRoute === 'admin' ? 'scale-x-100' : 'scale-x-0 group-hover:scale-x-100'}`}></span>
                                        </a>
                                    )}
                                </div>

                                {/* Actions */}
                                <div className="flex items-center space-x-3 md:space-x-4">
                                    {/* Desktop auth button */}
                                    <div className="hidden md:block">
                                        {user ? (
                                            <button onClick={logout} className="px-4 py-2 text-xs font-bold uppercase tracking-wider border-2 border-primary text-primary hover:bg-primary hover:text-white transition-all duration-300 rounded-full">
                                                Déconnexion
                                            </button>
                                        ) : (
                                            <button onClick={() => setRoute('login')} className="btn-connexion-cinematic">
                                                Connexion
                                            </button>
                                        )}
                                    </div>

                                    {/* Cart */}
                                    <div className="relative">
                                        <button className="btn-cart-cinematic" onClick={() => setIsCartOpen(true)}>
                                            <svg className="w-5 h-5 text-current" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <circle cx="9" cy="21" r="1"></circle>
                                                <circle cx="20" cy="21" r="1"></circle>
                                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                            </svg>
                                        </button>
                                        {cartCount > 0 && (
                                            <span className="absolute -top-2 -right-2 z-[3] bg-accent text-primary text-[12px] w-6 h-6 rounded-full flex items-center justify-center font-black shadow-lg animate-bounce border-2 border-white pointer-events-none">
                                                {cartCount}
                                            </span>
                                        )}
                                    </div>

                                    {/* Hamburger - mobile/tablet only */}
                                    <button className={`hamburger-btn ${menuOpen ? 'open' : ''}`} onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
                                        <span></span>
                                        <span></span>
                                        <span></span>
                                    </button>
                                </div>
                            </div>
                        </nav>
                    </div>
                </>
            );
        };

        const Footer = ({ setRoute }) => (
            <footer style={{ background: '#0a0a0a', color: 'white', padding: '60px 0', marginTop: 'auto' }}>
                <div className="container grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '40px' }}>
                    <div>
                        <h3 style={{ color: 'white', marginBottom: '20px', fontSize: '24px' }}>JbShoes</h3>
                        <p style={{ color: '#aaa', fontSize: '14px', lineHeight: 1.6 }}>L'élégance à chaque pas. Découvrez notre sélection premium de chaussures pour hommes et femmes au Maroc.</p>
                    </div>
                    <div>
                        <h4 style={{ color: 'white', marginBottom: '20px' }}>Liens Rapides</h4>
                        <ul style={{ listStyle: 'none', color: '#aaa', fontSize: '14px', lineHeight: 2 }}>
                            <li><a href="#" style={{ color: '#aaa', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); setRoute('shop'); }}>Boutique</a></li>
                            <li><a href="#" style={{ color: '#aaa', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); alert("Page bientôt disponible !"); }}>À propos</a></li>
                            <li><a href="#" style={{ color: '#aaa', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); alert("Page bientôt disponible !"); }}>Contact</a></li>
                            <li><a href="#" style={{ color: '#aaa', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); alert("FAQ bientôt disponible !"); }}>FAQ</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 style={{ color: 'white', marginBottom: '20px' }}>Service Client</h4>
                        <ul style={{ listStyle: 'none', color: '#aaa', fontSize: '14px', lineHeight: 2 }}>
                            <li><a href="#" style={{ color: '#aaa', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); alert("Page bientôt disponible !"); }}>Livraison & Retours</a></li>
                            <li><a href="#" style={{ color: '#aaa', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); alert("Page bientôt disponible !"); }}>Guide des tailles</a></li>
                            <li><a href="#" style={{ color: '#aaa', textDecoration: 'none' }} onClick={(e) => { e.preventDefault(); alert("Page bientôt disponible !"); }}>Mentions légales</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 style={{ color: 'white', marginBottom: '20px' }}>Contact</h4>
                        <p style={{ color: '#aaa', fontSize: '14px', lineHeight: 2 }}>
                            Email: <a href="mailto:contact@jbshoes.ma" style={{ color: '#aaa', textDecoration: 'none' }}>contact@jbshoes.ma</a><br />
                            Tél: <a href="tel:+212600000000" style={{ color: '#aaa', textDecoration: 'none' }}>06 00 00 00 00</a><br />
                            Casablanca, Maroc
                        </p>
                    </div>
                </div>
                <div className="container" style={{ borderTop: '1px solid #333', marginTop: '40px', paddingTop: '20px', textAlign: 'center', color: '#666', fontSize: '12px' }}>
                    &copy; 2026 JbShoes by Mohaj. Tous droits réservés.
                </div>
            </footer>
        );

        const ProductCard = ({ product, setRoute, setProductId }) => {
            const [currentImgIdx, setCurrentImgIdx] = useState(0);

            // Sécurité pour les anciens produits sauvegardés avec une virgule au lieu d'un tableau
            let safeImages = product.images || [];
            if (safeImages.length === 1 && safeImages[0].includes(',')) {
                safeImages = safeImages[0].split(',').map(s => s.trim()).filter(s => s);
            }

            useEffect(() => {
                if (safeImages.length <= 1) return;
                const timer = setInterval(() => {
                    setCurrentImgIdx(prev => (prev + 1) % safeImages.length);
                }, 3000); // 3 secondes
                return () => clearInterval(timer);
            }, [safeImages.length]); // Dépendance sur la longueur pour éviter les re-renders inutiles

            const handleClick = () => {
                setProductId(product._id);
                setRoute('product');
                window.scrollTo(0, 0);
            };

            return (
                <div className="product-card" onClick={handleClick} style={{ cursor: 'pointer' }}>
                    <div className="image-wrapper" style={{ overflow: 'hidden' }}>
                        {product.badge && <div className="product-badge" style={{ zIndex: 5 }}>{product.badge}</div>}

                        {/* Crossfade Images */}
                        {(safeImages.length > 0 ? safeImages : ['https://via.placeholder.com/300x400']).map((img, idx) => (
                            <img
                                key={idx}
                                src={img}
                                alt={`${product.name} ${idx}`}
                                style={{
                                    opacity: currentImgIdx === idx ? 1 : 0,
                                    transition: 'opacity 0.8s ease-in-out, transform 0.8s ease',
                                    zIndex: currentImgIdx === idx ? 2 : 1
                                }}
                            />
                        ))}
                        {safeImages.length > 1 && (
                            <div style={{ position: 'absolute', bottom: '10px', left: '0', right: '0', display: 'flex', justifyContent: 'center', gap: '5px', zIndex: 4 }}>
                                {safeImages.map((_, idx) => (
                                    <div key={idx} style={{ width: '6px', height: '6px', borderRadius: '50%', background: idx === currentImgIdx ? '#0a0a0a' : 'rgba(0,0,0,0.3)', transition: 'background 0.3s ease' }}></div>
                                ))}
                            </div>
                        )}
                        <div className="product-overlay" style={{ zIndex: 3 }}>
                            <span className="btn btn-primary">Voir le produit</span>
                        </div>
                    </div>

                    const Cart = ({setRoute}) => {

            const shipping = subtotal >= 500 ? 0 : 39;

                    const Checkout = ({setRoute, setLastOrder}) => {
            const {cart, subtotal, clearCart} = useContext(CartContext);
                    const {user} = useContext(AuthContext);
                    const showToast = useContext(ToastContext);

                    const [formData, setFormData] = useState({
                        firstName: user?.name?.split(' ')[0] || '',
                    lastName: user?.name?.split(' ')[1] || '',
                    email: user?.email || '',
                    phone: user?.phone || '',
                    address: user?.address || '',
                    city: user?.city || '',
                    zipCode: '',
                    paymentMethod: 'livraison',
                    notes: ''
            });

                    // Promo Code State
                    const [promoCodeInput, setPromoCodeInput] = useState('');
                    const [discount, setDiscount] = useState(null);
                    const [isApplyingPromo, setIsApplyingPromo] = useState(false);

                    // Card Simulation State
                    const [cardData, setCardData] = useState({number: '', name: '', expiry: '', cvv: '', focus: 'front' });

                    const [loading, setLoading] = useState(false);

            const shipping = subtotal >= 500 ? 0 : 39;
                    let discountAmount = 0;
                    if (discount) {
                        discountAmount = discount.discountType === 'percentage'
                            ? (subtotal * discount.discountAmount / 100)
                            : discount.discountAmount;
            }
                    const total = subtotal + shipping - discountAmount;

            const handleApplyPromo = async (codeToApply) => {
                const code = codeToApply || promoCodeInput;
                    if (!code) return;
                    setIsApplyingPromo(true);
                    try {
                    const res = await axios.post(`${API_URL}/promo/validate`, {code: code, amount: subtotal });
                    setDiscount(res.data);
                    showToast(`Code ${res.data.code} appliqué !`, 'success');
                } catch (err) {
                        showToast(err.response?.data?.message || "Code invalide", 'error');
                } finally {
                        setIsApplyingPromo(false);
                }
            };

            const handleSubmit = async (e) => {
                        e.preventDefault();
                    setLoading(true);

                    const orderData = {
                        customerInfo: {firstName: formData.firstName, lastName: formData.lastName, email: formData.email, phone: formData.phone },
                    shippingAddress: {address: formData.address, city: formData.city, zipCode: formData.zipCode },
                    items: cart.items.map(i => ({productId: i.product._id, name: i.product.name, price: i.product.price, image: i.product.images?.[0], size: i.size, quantity: i.quantity })),
                    paymentMethod: formData.paymentMethod,
                    subtotal,
                    shippingCost: shipping,
                    discountCode: discount?.code,
                    discountAmount: discountAmount,
                    total: total,
                    notes: formData.notes
                };

                    try {
                    const token = localStorage.getItem('token');
                    const headers = token ? {Authorization: `Bearer ${token}` } : { };
                    const res = await axios.post(`${API_URL}/orders`, orderData, {headers});

                    setLastOrder(res.data.order || res.data); // Support both structures
                    showToast('Commande validée avec succès !', 'success');
                    clearCart();
                    setRoute('success');
                } catch (err) {
                        showToast(err.response?.data?.message || 'Erreur lors de la commande', 'error');
                } finally {
                        setLoading(false);
                }
            };

                    return (
                    <div className="container page-enter" style={{ padding: '60px 0' }}>

                                    <div className="form-group"><input type="text" placeholder="Nom" required value={formData.lastName} onChange={e => setFormData({ ...formData, lastName: e.target.value })} /></div>
                                </div>

                                <div className="grid" style={{ gridTemplateColumns: '2fr 1fr', gap: '20px' }}>

                                {formData.paymentMethod === 'carte' && (
                                    <div className="page-enter">
                                        <div className={`card-wrapper ${cardData.focus === 'back' ? 'flipped' : ''}`}>

                                <button type="submit" className="btn btn-primary btn-block mt-8" disabled={loading}>
                                    {loading ? 'Traitement...' : `Confirmer la commande (${total} DH)`}
                                </button>
                            </form>

                            <div>
                                <div className="cart-summary" style={{ position: 'sticky', top: '100px' }}>

                                    {/* Visual Promo Tickets - itsu.ma style */}

                                            <div>

                                                            <p className="mt-4"><strong>Sous-total:</strong> {selectedOrder.subtotal} DH</p>
                                                            <p><strong>Livraison:</strong> {selectedOrder.shippingCost === 0 ? 'Gratuite' : `${selectedOrder.shippingCost} DH`}</p>
                                                            <h2 className="mt-4" style={{ color: 'var(--primary)' }}><strong>Total:</strong> {selectedOrder.total} DH</h2>
                                                        </div>
                                                    </div>

                                                    <h3 className="mb-4">Articles Commandés</h3>
                                                    <div style={{ background: '#fff', border: '1px solid #eee', borderRadius: '8px', overflow: 'hidden' }}>
                                                        <table className="table" style={{ marginBottom: 0 }}>
                                                            <thead>
                                                                <tr>
                                                                    <th>Image</th>
                                                                    <th>Produit</th>
                                                                    <th>Pointure</th>
                                                                    <th>Quantité</th>
                                                                    <th>Prix Unitaire</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {selectedOrder.items.map((item, i) => (
                                                                    <tr key={i}>
                                                                        <td>{item.image ? <img src={item.image} style={{ width: '50px', height: '50px', objectFit: 'cover', borderRadius: '4px' }} /> : '-'}</td>
                                                                        <td style={{ fontWeight: 'bold' }}>{item.name}</td>
                                                                        <td>{item.size}</td>
                                                                        <td>x {item.quantity}</td>
                                                                        <td>{item.price} DH</td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            )
                                        )}

                                        {activeTab === 'trends' && (
                                            <div className="page-enter">
                                                <h1 className="display-text mb-8">Gestion des Tendances (🔥 Home Carousel)</h1>
                                                <p className="mb-8" style={{ color: '#666' }}>Les produits sélectionnés ici s'afficheront dans le carousel "Tendances Parfaites" de la page d'accueil. Les articles vedettes apparaissent en premier.</p>
                                                <div className="grid" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '20px' }}>
                                                    {[...products].sort((a, b) => b.isFeatured - a.isFeatured).map(product => (
                                                        <div key={product._id} className="cart-summary" style={{ padding: '15px', display: 'flex', alignItems: 'center', gap: '15px', border: product.isFeatured ? '2px solid var(--primary)' : '1px solid #eee' }}>
                                                            <img src={product.images?.[0]} style={{ width: '60px', height: '60px', borderRadius: '8px', objectFit: 'cover' }} alt="" />
                                                            <div style={{ flex: 1 }}>
                                                                <div style={{ fontWeight: '600', fontSize: '14px', marginBottom: '4px' }}>{product.name}</div>
                                                                <div style={{ fontSize: '12px', color: '#888' }}>{product.brand} • {product.price} DH</div>
                                                            </div>
                                                            <button
                                                                onClick={() => handleToggleFeatured(product._id, product.isFeatured)}
                                                                className={`btn ${product.isFeatured ? 'btn-primary' : ''}`}
                                                                style={{ padding: '8px 12px', fontSize: '12px', minWidth: '80px', background: product.isFeatured ? '#c9a96e' : '#f0f0f0', color: product.isFeatured ? '#fff' : '#333', border: 'none' }}
                                                            >
                                                                {product.isFeatured ? '★ Vedette' : '☆ Normal'}
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {activeTab === 'produits' && (
                                            <>
                                                <div className="flex justify-between items-center mb-8">
                                                    <h1 className="display-text">Catalogue Produits</h1>
                                                    <button className="btn btn-primary" onClick={() => {
                                                        if (showAddProduct) {
                                                            setShowAddProduct(false);
                                                            setIsEditing(false);
                                                            setEditingId(null);
                                                            setNewProd({ name: '', price: '', category: '', brand: 'Autre', description: '', sizes: '', stock: '', images: '' });
                                                        } else {
                                                            setShowAddProduct(true);
                                                        }
                                                    }}>
                                                        {showAddProduct ? 'Annuler' : '+ Nouveau Produit'}
                                                    </button>
                                                </div>

                                                {showAddProduct && (
                                                    <div style={{ background: '#f9f9f9', padding: '30px', marginBottom: '40px', borderRadius: '8px' }}>
                                                        <h3 className="mb-4">{isEditing ? 'Modifier le produit' : 'Ajouter un produit'}</h3>
                                                        <form onSubmit={handleSubmitProduct}>
                                                            <div className="grid" style={{ gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                                                                <div className="form-group">
                                                                    <label>Nom du produit</label>
                                                                    <input type="text" value={newProd.name} onChange={e => setNewProd({ ...newProd, name: e.target.value })} required />
                                                                </div>
                                                                <div className="form-group">
                                                                    <label>Prix (DH)</label>
                                                                    <input type="number" value={newProd.price} onChange={e => setNewProd({ ...newProd, price: e.target.value })} required />
                                                                </div>
                                                            </div>
                                                            <div className="grid" style={{ gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                                                                <div className="form-group">
                                                                    <label>Catégorie</label>
                                                                    <select value={newProd.category} onChange={e => setNewProd({ ...newProd, category: e.target.value })} required>
                                                                        <option value="">Choisir une catégorie...</option>
                                                                        {categories.map(c => <option key={c._id} value={c._id}>{c.emoji} {c.name}</option>)}
                                                                    </select>
                                                                </div>
                                                                <div className="form-group">
                                                                    <label>Marque</label>
                                                                    <select value={newProd.brand} onChange={e => setNewProd({ ...newProd, brand: e.target.value })}>
                                                                        {["Nike", "Adidas", "Puma", "New Balance", "Converse", "Vans", "Autre"].map(b => (
                                                                            <option key={b} value={b}>{b}</option>
                                                                        ))}
                                                                    </select>
                                                                </div>
                                                            </div>
                                                            <div className="grid" style={{ gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                                                                <div className="form-group">
                                                                    <label>Quantité en Stock</label>
                                                                    <input type="number" value={newProd.stock} onChange={e => setNewProd({ ...newProd, stock: e.target.value })} />
                                                                </div>
                                                                <div className="form-group">
                                                                    <label>Pointures / Tailles (ex: 38, 39, 40)</label>
                                                                    <input type="text" value={newProd.sizes} onChange={e => setNewProd({ ...newProd, sizes: e.target.value })} placeholder="38, 39, 40" required />
                                                                </div>
                                                            </div>
                                                            <div className="form-group">
                                                                <label>Liens des images (séparés par virgule) OU <strong>Importer du PC</strong></label>
                                                                <input type="file" multiple onChange={handleImageUpload} accept="image/*" style={{ marginBottom: '10px', display: 'block', fontSize: '14px' }} />
                                                                {uploading && <span style={{ color: 'var(--primary)', fontSize: '12px', display: 'block', marginBottom: '10px' }}>Patience... Upload en cours...</span>}
                                                                <input type="text" value={newProd.images} onChange={e => setNewProd({ ...newProd, images: e.target.value })} placeholder="https://img1.jpg, https://img2.jpg" required />
                                                                {(typeof newProd.images === 'string' && newProd.images.trim().length > 0) && (
                                                                    <div style={{ display: 'flex', gap: '10px', marginTop: '10px', flexWrap: 'wrap' }}>
                                                                        {newProd.images.split(',').filter(x => x.trim()).map((img, idx) => (
                                                                            <div key={idx} style={{ width: '60px', height: '60px', borderRadius: '4px', border: '1px solid #ddd', overflow: 'hidden' }}>
                                                                                <img src={img.trim()} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <div className="form-group">
                                                                <label>Description détaillée</label>
                                                                <textarea rows="3" value={newProd.description} onChange={e => setNewProd({ ...newProd, description: e.target.value })} required></textarea>
                                                            </div>
                                                            <button type="submit" className="btn btn-primary" style={{ marginTop: '10px' }}>{isEditing ? 'Enregistrer les modifications' : 'Ajouter à la boutique'}</button>
                                                        </form>
                                                    </div>
                                                )}

                                                <div style={{ overflowX: 'auto' }}>
                                                    <table className="table">
                                                        <thead>
                                                            <tr>
                                                                <th>Image</th>
                                                                <th>Nom</th>
                                                                <th>Prix</th>
                                                                <th>Stock</th>
                                                                <th>Catégorie</th>
                                                                <th style={{ textAlign: 'right' }}>Actions</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {products.map(p => (
                                                                <tr key={p._id}>
                                                                    <td><img src={p.images[0] || 'https://via.placeholder.com/40'} style={{ width: '40px', height: '40px', objectFit: 'cover', borderRadius: '4px' }} /></td>
                                                                    <td style={{ fontWeight: 'bold' }}>{p.name}</td>
                                                                    <td>{p.price} DH</td>
                                                                    <td>{p.stock}</td>
                                                                    <td>{p.category?.name || 'Inconnue'}</td>
                                                                    <td style={{ textAlign: 'right' }}>
                                                                        <button className="btn btn-outline" style={{ padding: '4px 10px', fontSize: '12px', marginRight: '5px' }} onClick={() => handleEditClick(p)}>Modifier</button>
                                                                        <button className="btn btn-outline" style={{ padding: '4px 10px', fontSize: '12px', borderColor: '#dc2626', color: '#dc2626' }} onClick={() => handleDeleteProduct(p._id)}>Supprimer</button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </>
                                        )}

                                        {activeTab === 'clients' && (
                                            <>
                                                <h1 className="display-text mb-8">Liste des Clients</h1>
                                                <div style={{ overflowX: 'auto' }}>
                                                    <table className="table">
                                                        <thead>
                                                            <tr>
                                                                <th>Nom</th>
                                                                <th>Email</th>
                                                                <th>Téléphone</th>
                                                                <th>Ville</th>
                                                                <th>Rôle</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {users.map(u => (
                                                                <tr key={u._id}>
                                                                    <td style={{ fontWeight: 'bold' }}>{u.name}</td>
                                                                    <td>{u.email}</td>
                                                                    <td>{u.phone || '-'}</td>
                                                                    <td>{u.city || '-'}</td>
                                                                    <td>
                                                                        <span style={{ padding: '4px 8px', borderRadius: '12px', fontSize: '12px', background: u.role === 'admin' ? '#c9a96e' : '#f1f5f9', color: u.role === 'admin' ? '#fff' : '#333' }}>
                                                                            {u.role.toUpperCase()}
                                                                        </span>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </>
                                        )}

                                        {/* Section tendances dupliquée supprimée — voir activeTab === 'trends' ci-dessus */}
                                    </div>
                                </div>
                                );
        }

                                // --- EXPERIMENTAL CAROUSEL COMPONENT ---
                                const TrendingCarousel = ({products = [], setProductId, setRoute}) => {
            const swiperRef = useRef(null);

            useEffect(() => {
                if (!products || products.length === 0) return;

                                const backgroundWrapper = document.querySelectorAll(".co-background");

                                const swiper = new window.Swiper(".swiper", {
                                    loop: false,
                                watchSlidesProgress: true,
                                speed: 1000,
                                grabCursor: true,
                                navigation: {
                                    nextEl: ".co-carousel__nav-button.next",
                                prevEl: ".co-carousel__nav-button.prev"
                    },
                                on: {
                                    touchEnd: function (s) {
                            const time = Date.now() - s.touchEventsData.touchStartTime;
                                const distance = Math.abs(s.touches.diff);
                                const velocity = distance / time;
                                let newSpeed = 1000 - velocity * 800;
                                s.params.speed = Math.max(200, Math.min(1000, newSpeed));
                        },
                                progress: function (s) {
                                    s.slides.forEach((slide, index) => {
                                        const progress = slide.progress;
                                        if (progress >= -1 && progress <= 1) {
                                            const rotateShoeMax = 15;
                                            const scaleMax = 1.3;
                                            const progressPositive = Math.abs(progress);

                                            const translateX = progress * -100;
                                            const rotateShoe = progressPositive * rotateShoeMax - rotateShoeMax;
                                            const rotateCard = progress * -15;
                                            const textMaskY = progressPositive * 50;
                                            const scale = 1 - progressPositive * 0.2;
                                            const opacity = 0.5 - progressPositive * 0.5;

                                            slide.querySelector(".co-card").style.transform = `scale(${scale})`;
                                            slide.querySelector(".co-card__shoe-img").style.transform = `translate3d(${translateX}px, 0,0) rotate(${rotateShoe}deg)`;
                                            slide.querySelector(".co-card__shoe-shadow").style.transform = `translate3d(${translateX / 2}px, 0,0)`;

                                            if (backgroundWrapper[index]) {
                                                backgroundWrapper[index].style.opacity = opacity.toFixed(2);
                                            }

                                            const textsMask = slide.querySelectorAll(".text-mask span");
                                            textsMask.forEach((t, i) => {
                                                t.style.transform = `translate3d(0,${textMaskY * (i + 1)}px,0)`;
                                            });
                                        }
                                    });
                        },
                                setTransition: function (s, speed) {
                                    s.slides.forEach((slide, index) => {
                                        slide.querySelector(".co-card").style.transition = `${speed}ms`;
                                        slide.querySelector(".co-card__shoe-img").style.transition = `${speed}ms`;
                                        slide.querySelector(".co-card__shoe-shadow").style.transition = `${speed}ms`;
                                        if (backgroundWrapper[index]) {
                                            backgroundWrapper[index].style.transition = `${speed}ms`;
                                        }

                                        const textsMask = slide.querySelectorAll(".text-mask span");
                                        textsMask.forEach((t) => {
                                            t.style.transition = `${speed}ms`;
                                        });
                                    });
                        },
                                transitionEnd: function (s) {
                                    s.params.speed = 1000;
                        }
                    }
                });

                return () => {
                    if (swiper) swiper.destroy();
                };
            }, [products]);

                                if (!products || products.length === 0) return <div style={{ height: '400px' }}></div>;

                                return (
                                <>
                                    {products.map((_, i) => (
                                        <div key={`bg-${i}`} className={`co-background co-background--style-${i % 4}`}></div>
                                    ))}

                                    <div className="co-carousel-wrap">
                                        <div className="swiper co-carousel">
                                            <div className="swiper-wrapper">
                                                {products.map((p, index) => (
                                                    <div key={p._id} className="swiper-slide co-carousel__slide" onClick={() => { if (setProductId && setRoute) { setProductId(p._id); setRoute('product'); } }}>
                                                        <div className={`co-card co-card--style-${index % 4}`}>
                                                            <div className="co-card__shoe">
                                                                <img className="co-card__shoe-img" src={p.images?.[0] || 'https://via.placeholder.com/300x200'} alt={p.name} style={{ width: '80%', height: 'auto', objectFit: 'contain' }} />
                                                                <span className="co-card__shoe-shadow"></span>
                                                            </div>
                                                            <div className="co-card__info">
                                                                <div className="co-card__collection text-mask">
                                                                    <span>{p.category?.name || p.brand || 'Collection'}</span>
                                                                </div>
                                                                <div className="co-card__title text-mask">
                                                                    <span>{p.name}</span>
                                                                </div>
                                                                <div className="co-card__price text-mask"><span>{p.price} DH</span></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="co-carousel__nav-buttons">
                                            <div className="co-carousel__nav-button prev">
                                                <span>Précédent</span>
                                            </div>
                                            <div className="co-carousel__nav-button next">
                                                <span>Suivant</span>
                                            </div>
                                        </div>
                                    </div>
                                </>
                                );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [route, setRoute] = useState('home');
                                const [productId, setProductId] = useState(null);
                                const [lastOrder, setLastOrder] = useState(null);
                                const [shopFilters, setShopFilters] = useState({category: '', search: '', brand: 'all' });

            const navigateToShop = (filters) => {
                                    setShopFilters((prev) => ({ ...prev, ...filters }));
                                setRoute('shop');
            };

            useEffect(() => {
                                    window.scrollTo(0, 0);
            }, [route, productId]);

            const renderPage = () => {
                switch (route) {
                    case 'home': return <Home setRoute={setRoute} navigateToShop={navigateToShop} setProductId={setProductId} />;
                                case 'shop': return <Shop setRoute={setRoute} setProductId={setProductId} initialFilters={shopFilters} />;
                                case 'product': return <ProductDetail productId={productId} setRoute={setRoute} />;
                                case 'cart': return <Cart setRoute={setRoute} />;
                                case 'checkout': return <Checkout setRoute={setRoute} setLastOrder={setLastOrder} />;
                                case 'success': return <OrderSuccess order={lastOrder} setRoute={setRoute} />;
                                case 'login': return <Login setRoute={setRoute} />;
                                case 'admin': return <AdminDashboard setRoute={setRoute} />;
                                default: return <Home setRoute={setRoute} navigateToShop={navigateToShop} setProductId={setProductId} />;
                }
            };

                                return (
                                <ToastProvider>
                                    <AuthProvider>
                                        <CartProvider>
                                            <Ticker />
                                            <Navbar setRoute={setRoute} currentRoute={route} navigateToShop={navigateToShop} setProductId={setProductId} />
                                            <SideCart setRoute={setRoute} />
                                            <main style={{ minHeight: 'calc(100vh - 400px)' }}>
                                                {renderPage()}
                                            </main>
                                            <Footer setRoute={setRoute} />
                                        </CartProvider>
                                    </AuthProvider>
                                </ToastProvider>
                                );
        };

                                const root = ReactDOM.createRoot(document.getElementById('root'));
                                root.render(<App />);
    </script>
</body>

</html>
